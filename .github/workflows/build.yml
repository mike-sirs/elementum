name: build

on:
  push:
    branches:
      - '*'
    tags:
      - v*
  pull_request:
    branches:
      - '*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        platform: [
          client,
          android-arm, android-arm64, android-x64, android-x86,
          darwin-x64,
          linux-armv6, linux-armv7, linux-armv7_softfp, linux-arm64, linux-x64, linux-x86,
          windows-x64, windows-x86 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get tags
        run: |
          git fetch --tags origin
          git fetch --prune --unshallow

      - name: Get Go environment
        id: go-env
        run: |
          mkdir -p ~/.cache/go-build
          mkdir -p ~/.cache/go-cache
          mkdir -p ~/.cache/go-modcache
          echo "GOPATH=$(readlink -f ~/.cache/go-build)" >> $GITHUB_ENV
          echo "GOCACHE=$(readlink -f ~/.cache/go-cache)" >> $GITHUB_ENV
          echo "GOMODCACHE=$(readlink -f ~/.cache/go-modcache)" >> $GITHUB_ENV

      - name: Set up cache
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.GOPATH }}
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: elementum-${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            elementum-${{ runner.os }}-go-

      - name: Build ${{ matrix.platform }}
        run: | 
          make ${{ matrix.platform }} 
          make ${{ matrix.platform }}-shared

      - name: Generate ${{ matrix.platform }} zip
        id: generate_zip
        run: |
          make zip PLATFORM=${{ matrix.platform }}
          asset_path=$(ls build/*.zip)
          echo "::set-output name=asset_path::${asset_path}"
          echo "::set-output name=asset_name::$(basename "${asset_path}")"

      - name: Upload ${{ matrix.platform }} zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: ${{ steps.generate_zip.outputs.asset_path }}

  build-darwin-arm64:
    name: Build darwin-arm64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get tags
        run: |
          git fetch --tags origin
          git fetch --prune --unshallow

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up cache
        uses: actions/cache@v3
        with:
          path: |
            .build-darwin-arm64/boost-prefix
            .build-darwin-arm64/lt-prefix
            ~/go/pkg/mod
            ~/Library/Caches/go-build
          key: elementum-darwin-arm64-${{ hashFiles('scripts/build-darwin-arm64.sh', '**/go.sum') }}
          restore-keys: |
            elementum-darwin-arm64-

      - name: Build darwin-arm64
        run: scripts/build-darwin-arm64.sh

      - name: Generate darwin-arm64 zip
        id: generate_zip
        run: |
          GIT_VERSION=$(git describe --tags)
          ( cd build/darwin_arm64 && zip -9 -r "../elementum.${GIT_VERSION}.darwin_arm64.zip" . )
          asset_path=$(ls build/*.zip)
          echo "asset_path=${asset_path}" >> $GITHUB_OUTPUT
          echo "asset_name=$(basename "${asset_path}")" >> $GITHUB_OUTPUT

      - name: Upload darwin-arm64 zip
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: ${{ steps.generate_zip.outputs.asset_path }}

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs: [build, build-darwin-arm64]
    if: success() && github.event_name == 'create' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract and re-bundle all platforms
        run: |
          cd artifacts

          for d in */; do
            echo "Processing $d"
            find "$d" -name '*.zip' -exec unzip -o -d "$d" {} \; -delete
          done

          for d in */; do
            dir_name="${d%/}"
            new_name="${dir_name//-/_}"
            if [ "$dir_name" != "$new_name" ]; then
              echo "Renaming $dir_name to $new_name"
              mv "$dir_name" "$new_name"
            fi
          done

          zip -r ../elementum-binaries.zip .

      - name: Upload combined zip
        uses: actions/upload-artifact@v7
        with:
          name: elementum-binaries
          path: elementum-binaries.zip

  # TODO: Remove when ready with release process
  # release:
  #   name: Release
  #   runs-on: ubuntu-22.04
  #   needs: build
  #   if: success() && github.event_name == 'create' && startsWith(github.ref, 'refs/tags/')
  #   steps:
  #     - name: Perform release
  #       run: |
  #         ./push-binaries.sh
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-downstream:
    name: Trigger plugin.video.elementum build
    runs-on: ubuntu-latest
    needs: bundle
    steps:
      - name: Trigger workflow in plugin.video.elementum
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'elgatito',
              repo: 'plugin.video.elementum',
              workflow_id: 'build.yml',
              ref: 'master',
              inputs: {
                binaries_branch: context.refName
              }
            });
            