name: build

on:
  push:
    branches:
      - '*'
    tags:
      - v*
  pull_request:
    branches:
      - '*'

jobs:
  build-darwin-arm64:
    name: Build darwin-arm64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get tags
        run: |
          git fetch --tags origin
          git fetch --prune --unshallow

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up cache
        uses: actions/cache@v3
        with:
          path: |
            .build-darwin-arm64/boost-prefix
            .build-darwin-arm64/lt-prefix
            ~/go/pkg/mod
            ~/Library/Caches/go-build
          key: elementum-darwin-arm64-${{ hashFiles('scripts/build-darwin-arm64.sh', '**/go.sum') }}
          restore-keys: |
            elementum-darwin-arm64-

      - name: Build darwin-arm64
        run: scripts/build-darwin-arm64.sh

      - name: Generate darwin-arm64 zip
        id: generate_zip
        run: |
          GIT_VERSION=$(git describe --tags)
          ( cd build/darwin_arm64 && zip -9 -r "../elementum.${GIT_VERSION}.darwin_arm64.zip" . )
          asset_path=$(ls build/*.zip)
          echo "asset_path=${asset_path}" >> $GITHUB_OUTPUT
          echo "asset_name=$(basename "${asset_path}")" >> $GITHUB_OUTPUT

      - name: Upload darwin-arm64 zip
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: ${{ steps.generate_zip.outputs.asset_path }}

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs: [build-darwin-arm64]
    if: success() && github.event_name == 'create' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract and re-bundle all platforms
        run: |
          cd artifacts

          for d in */; do
            echo "Processing $d"
            find "$d" -name '*.zip' -exec unzip -o -d "$d" {} \; -delete
          done

          for d in */; do
            dir_name="${d%/}"
            new_name="${dir_name//-/_}"
            if [ "$dir_name" != "$new_name" ]; then
              echo "Renaming $dir_name to $new_name"
              mv "$dir_name" "$new_name"
            fi
          done

          zip -r ../elementum-binaries.zip .

      - name: Upload combined zip
        uses: actions/upload-artifact@v7
        with:
          name: elementum-binaries
          path: elementum-binaries.zip

